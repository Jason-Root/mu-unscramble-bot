name: Release Windows App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          .\scripts\build_release.ps1 -Version $version

      - name: Publish file update branch
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $publishSource = Join-Path $PWD "dist\update-files"
          $publishRoot = Join-Path $env:RUNNER_TEMP "mu-update-files"
          if (Test-Path $publishRoot) {
            Remove-Item -LiteralPath $publishRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $publishRoot | Out-Null
          Set-Location $publishRoot
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan update-files
          if (-not (Test-Path $publishSource)) {
            throw "Update publish source was not created: $publishSource"
          }
          Copy-Item -Path (Join-Path $publishSource "*") -Destination $publishRoot -Recurse -Force
          New-Item -ItemType File -Path ".nojekyll" | Out-Null
          git add -A
          git commit -m "Publish file update manifest for v$version"
          git remote add origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          git push origin update-files --force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MU-Unscramble-Bot-*-win64.zip
